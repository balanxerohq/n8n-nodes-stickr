# Publishes this n8n community node package to npm on every version tag push.
#
# Uses npm Trusted Publishing (OIDC) — no long-lived secrets required.
# Configure once on npmjs.com: Package Settings → Publish access →
# Trusted Publishers → Add GitHub Actions publisher for this workflow.
#
# Reference: https://docs.npmjs.com/trusted-publishers

name: Publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            DIST_TAG="${BASH_REMATCH[1]}"
          else
            DIST_TAG="latest"
          fi
          npm publish --ignore-scripts --tag "$DIST_TAG"
